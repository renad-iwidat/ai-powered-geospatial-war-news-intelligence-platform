# Docker Compose for GeoNews AI Platform
# Database is hosted on Render
# Backend runs API + Scheduler together
# Frontend runs Next.js
version: '3.8'

services:
  # Backend API + Scheduler (FastAPI with integrated scheduler)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geonews-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      NEWS_VIEW_NAME: ${NEWS_VIEW_NAME}
      CORS_ORIGINS: ${CORS_ORIGINS}
    ports:
      - "${BACKEND_PORT}:7235"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7235/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - geonews-network
    volumes:
      - ./app:/app/app:ro
      - ./scripts:/app/scripts:ro

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:7235
    container_name: geonews-frontend
    restart: unless-stopped
    environment:
      FRONTEND_PORT: ${FRONTEND_PORT}
      NEXT_PUBLIC_API_URL: http://backend:7235
    ports:
      - "${FRONTEND_PORT}:3001"
    depends_on:
      - backend
    networks:
      - geonews-network

  # Standalone Scheduler (Optional - uncomment to enable)
  # scheduler:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: geonews-scheduler
  #   restart: unless-stopped
  #   environment:
  #     DATABASE_URL: ${DATABASE_URL}
  #     OPENAI_API_KEY: ${OPENAI_API_KEY}
  #     OPENAI_MODEL: ${OPENAI_MODEL}
  #     NEWS_VIEW_NAME: ${NEWS_VIEW_NAME}
  #     API_BASE_URL: http://backend:7235
  #   command: python scripts/run_scheduler.py
  #   depends_on:
  #     - backend
  #   networks:
  #     - geonews-network

networks:
  geonews-network:
    driver: bridge
