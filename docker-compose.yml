# Docker Compose for GeoNews AI Platform
version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: geonews-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geonews_db}
      POSTGRES_USER: ${POSTGRES_USER:-geonews_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geonews_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - geonews-network

  # Backend API (FastAPI)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geonews-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-geonews_user}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-geonews_db}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://frontend:3000}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - geonews-network
    volumes:
      - ./app:/app/app:ro
      - ./scripts:/app/scripts:ro

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: geonews-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - geonews-network

  # Data Processor (runs every 15 minutes)
  # Processes news data: NER extraction, geocoding, metrics extraction
  processor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geonews-processor
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-geonews_user}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-geonews_db}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    command: >
      sh -c "
        while true; do
          echo '[Processor] Running at $(date)'
          python scripts/process_all_data.py
          echo '[Processor] Completed. Next run in 15 minutes...'
          sleep 900
        done
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - geonews-network
    volumes:
      - ./scripts:/app/scripts:ro

networks:
  geonews-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
